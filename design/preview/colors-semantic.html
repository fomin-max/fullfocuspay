<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head><body>
  <div class="card-col" style="gap:14px">
    <div class="card-eyebrow">Semantic colors · Status / feedback</div>
    <div style="display:grid; grid-template-columns: repeat(2, 1fr); gap:14px;">
      
  <div style="display:flex; align-items:center; gap:12px;">
    <div style="width:48px; height:48px; border-radius:10px; background:#6632FA; border:1px solid var(--pay-border-2); "></div>
    <div style="display:flex; flex-direction:column; gap:2px;">
      <div class="pay-body-strong" style="font-size:13px">Brand</div>
      <div class="pay-mono" style="font-size:11px; color:var(--pay-fg-3)">#6632FA</div>
      <div class="pay-caption" style="font-size:11px">Primary actions</div>
    </div>
  </div>

      
  <div style="display:flex; align-items:center; gap:12px;">
    <div style="width:48px; height:48px; border-radius:10px; background:#00FFB6; border:1px solid var(--pay-border-2); "></div>
    <div style="display:flex; flex-direction:column; gap:2px;">
      <div class="pay-body-strong" style="font-size:13px">Success</div>
      <div class="pay-mono" style="font-size:11px; color:var(--pay-fg-3)">#00FFB6</div>
      <div class="pay-caption" style="font-size:11px">Sent · Delivered</div>
    </div>
  </div>

      
  <div style="display:flex; align-items:center; gap:12px;">
    <div style="width:48px; height:48px; border-radius:10px; background:#FFB547; border:1px solid var(--pay-border-2); "></div>
    <div style="display:flex; flex-direction:column; gap:2px;">
      <div class="pay-body-strong" style="font-size:13px">Warning</div>
      <div class="pay-mono" style="font-size:11px; color:var(--pay-fg-3)">#FFB547</div>
      <div class="pay-caption" style="font-size:11px">Pending · Attention</div>
    </div>
  </div>

      
  <div style="display:flex; align-items:center; gap:12px;">
    <div style="width:48px; height:48px; border-radius:10px; background:#FF5468; border:1px solid var(--pay-border-2); "></div>
    <div style="display:flex; flex-direction:column; gap:2px;">
      <div class="pay-body-strong" style="font-size:13px">Danger</div>
      <div class="pay-mono" style="font-size:11px; color:var(--pay-fg-3)">#FF5468</div>
      <div class="pay-caption" style="font-size:11px">Failed · Refused</div>
    </div>
  </div>

      
  <div style="display:flex; align-items:center; gap:12px;">
    <div style="width:48px; height:48px; border-radius:10px; background:#5BA8FF; border:1px solid var(--pay-border-2); "></div>
    <div style="display:flex; flex-direction:column; gap:2px;">
      <div class="pay-body-strong" style="font-size:13px">Info</div>
      <div class="pay-mono" style="font-size:11px; color:var(--pay-fg-3)">#5BA8FF</div>
      <div class="pay-caption" style="font-size:11px">Neutral notice</div>
    </div>
  </div>

      
  <div style="display:flex; align-items:center; gap:12px;">
    <div style="width:48px; height:48px; border-radius:10px; background:#262050; border:1px solid var(--pay-border-2); "></div>
    <div style="display:flex; flex-direction:column; gap:2px;">
      <div class="pay-body-strong" style="font-size:13px">Border</div>
      <div class="pay-mono" style="font-size:11px; color:var(--pay-fg-3)">#262050</div>
      <div class="pay-caption" style="font-size:11px">Hairlines at 10% white</div>
    </div>
  </div>

    </div>
  </div>
